name: Run bot every 10 minutes

on:
  schedule:
    - cron: '*/10 * * * *'  # запуск каждые 10 минут (по UTC)
  workflow_dispatch: {}     # ручной запуск в Actions

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run notify
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}        # обязательный
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}    # опционально: один chatId или @username
          TELEGRAM_CHAT_LIST: ${{ secrets.TELEGRAM_CHAT_LIST }}# опционально: CSV ("id1,id2") или JSON ('["id1","id2"]')
        run: npm run notify
