name: Run bot every 10 minutes

on:
 schedule:
   - cron: '*/10 * * * *'
 workflow_dispatch: {}

jobs:
 run:
  runs-on: ubuntu-latest

  steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v4
    with:
      python-version: '3.11'

  - name: Install deps
    run: python -m pip install --upgrade pip && pip install -r requirements.txt

  - name: Run bot
    env:
      TELEGRAM\_TOKEN: \${{ secrets.TELEGRAM\_TOKEN }}
      GITHUB\_REPOSITORY: \${{ github.repository }}
      STATE\_ISSUE: "1"
    run: python bot.py

  - name: Commit state back if changed
    env:
      PUSH\_TOKEN: \${{ secrets.PUSH\_TOKEN }}
    run: |
      git config user.name "github-actions[bot]"
      git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      if git status --porcelain | grep -q state.json; then
        git add state.json
        git commit -m "Update state from actions run"
        git remote set-url origin https://x-access-token:\${PUSH\_TOKEN}@github.com/\${{ github.repository }}.git
        git push origin HEAD:main
      else
        echo "No state change"
      fi
